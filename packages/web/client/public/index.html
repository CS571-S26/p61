<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MergeNB - Conflict Resolver</title>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@1,500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@1,500&display=swap"></noscript>
    <link rel="stylesheet" href="/katex/katex.min.css">
    <style>
        body { margin: 0; background: #1D1915; }
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
            color: #EFE7DB;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.12);
            border-top-color: #7FB9C7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root" data-theme="dark">
        <div class="loading-container">
            <div class="spinner"></div>
            <p>Loading MergeNB...</p>
        </div>
    </div>
    <script type="module" src="/client.js"></script>
</body>
</html>
